<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-labelledby="title desc">
  <title id="title">Recipes logo for dark backgrounds</title>
  <desc id="desc">Horizontal Recipes wordmark for dark backgrounds with a bright sienna stacked recipe card line-art mark and inline checkmarks.</desc>

  <rect width="240" height="64" fill="#1A1714"/>

  <g transform="translate(18 13)" fill="none" stroke="#D97A4E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- back card -->
    <path d="M13 4.5h26c2.2 0 4 1.8 4 4v22"/>

    <!-- front card -->
    <rect x="4" y="9" width="35" height="28" rx="4.5"/>

    <!-- recipe lines -->
    <path d="M11 17h18"/>
    <path d="M11 23h14"/>
    <path d="M11 29h14"/>
  </g>

  <g transform="translate(18 13)" fill="none" stroke="#D97A4E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- inline checkmarks with added spacing -->
    <path d="M30 22.1l1 1 1.9-2.2"/>
    <path d="M30 28.1l1 1 1.9-2.2"/>
  </g>

  <text
    x="78"
    y="42"
    fill="#F2EDE3"
    font-family="Newsreader, 'Iowan Old Style', Georgia, serif"
    font-weight="500"
    font-size="30"
    letter-spacing="-0.9">Recipes</text>

  <circle cx="193" cy="40.3" r="2.7" fill="#D97A4E"/>
</svg>

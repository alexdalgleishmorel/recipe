<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-labelledby="title desc">
  <title id="title">Recipes app icon</title>
  <desc id="desc">Rounded square app icon with a warm sienna stacked recipe card line-art mark and inline checkmarks.</desc>

  <rect x="3" y="3" width="50" height="50" rx="14" fill="#FAF7F2"/>
  <rect x="3" y="3" width="50" height="50" rx="14" fill="none" stroke="#B65A33" stroke-width="1.6"/>

  <g transform="translate(10.5 10)" fill="none" stroke="#B65A33" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- back card -->
    <path d="M9 3.5h19.5c1.8 0 3.2 1.4 3.2 3.2v17"/>

    <!-- front card -->
    <rect x="2" y="7.5" width="26.5" height="23.5" rx="4"/>

    <!-- recipe lines -->
    <path d="M7.5 14.5h13.5"/>
    <path d="M7.5 19.5h9.8"/>
    <path d="M7.5 24.5h9.8"/>
  </g>

  <g transform="translate(10.5 10)" fill="none" stroke="#B65A33" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
    <!-- inline checkmarks with added spacing -->
    <path d="M19.3 18.9l0.85 0.85 1.55-1.9"/>
    <path d="M19.3 23.9l0.85 0.85 1.55-1.9"/>
  </g>
</svg>

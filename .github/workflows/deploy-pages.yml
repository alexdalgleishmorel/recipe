name: Deploy Pages

# Builds the Flutter web app and publishes it to GitHub Pages. The site is served at
# https://alexdalgleishmorel.github.io/recipe/ so the build is given --base-href=/recipe/.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href=/recipe/
      # SPA fallback: GitHub Pages serves 404.html for unknown paths.
      - run: cp build/web/index.html build/web/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

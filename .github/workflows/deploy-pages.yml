name: Deploy Pages

# Builds the Flutter web app and publishes it to GitHub Pages. The site is served at
# https://alexdalgleishmorel.github.io/recipe/ so the build is given --base-href=/recipe/.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - run: flutter pub get
      # Production build: point the app at the live backend (Cognito + API).
      # Config comes from repo variables; OAUTH_REDIRECT_URI is pinned to the
      # exact Cognito callback URL. Flip USE_BACKEND to false to revert to the
      # local-only demo.
      - run: |
          flutter build web --release \
            --base-href=/recipe/ \
            --dart-define=USE_BACKEND=true \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }} \
            --dart-define=COGNITO_DOMAIN=${{ vars.COGNITO_DOMAIN }} \
            --dart-define=COGNITO_APP_CLIENT_ID=${{ vars.COGNITO_APP_CLIENT_ID }} \
            --dart-define=COGNITO_REGION=${{ vars.COGNITO_REGION }} \
            --dart-define=OAUTH_REDIRECT_URI=https://alexdalgleishmorel.github.io/recipe/
      # Rasterize the brand SVG into the PWA/favicon PNGs (the source of truth is
      # web/favicon.svg; PNGs are generated here so we don't commit binaries).
      - name: Rasterize brand icons
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 32  -h 32  web/favicon.svg -o build/web/favicon.png
          rsvg-convert -w 192 -h 192 web/favicon.svg -o build/web/icons/Icon-192.png
          rsvg-convert -w 512 -h 512 web/favicon.svg -o build/web/icons/Icon-512.png
          rsvg-convert -w 192 -h 192 web/favicon.svg -o build/web/icons/Icon-maskable-192.png
          rsvg-convert -w 512 -h 512 web/favicon.svg -o build/web/icons/Icon-maskable-512.png
      # SPA fallback: GitHub Pages serves 404.html for unknown paths.
      - run: cp build/web/index.html build/web/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
